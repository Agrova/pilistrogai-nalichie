<style>
:root{--bg:#f6f3ee;--card:#fff;--ink:#2b2622;--mut:#8a8177;--acc:#b3562e;--line:#e7e0d6}
*{box-sizing:border-box;margin:0;padding:0}
body{font:16px/1.45 -apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink)}
header{background:var(--ink);color:#f6f3ee;padding:26px 16px 20px;text-align:center}
header h1{font-size:26px;letter-spacing:.5px}
header .sub{color:#c8bfb4;font-size:13px;margin-top:6px}
.wrap{max-width:900px;margin:0 auto;padding:16px}
.search{position:sticky;top:0;z-index:5;background:var(--bg);padding:12px 0}

.chips{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 14px}
.chip{padding:6px 12px;border:1px solid var(--line);border-radius:999px;background:var(--card);font-size:13px;cursor:pointer;user-select:none}
.chip.on{background:var(--acc);color:#fff;border-color:var(--acc)}
section{margin-bottom:22px}
h2{font-size:18px;margin:18px 4px 8px;display:flex;align-items:baseline;gap:8px}
h2 .cnt{font-size:13px;color:var(--mut);font-weight:400}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.row{display:flex;justify-content:space-between;gap:12px;padding:10px 14px;border-top:1px solid var(--line);align-items:baseline}
.row:first-child{border-top:none}
.nm{flex:1}
.pr{white-space:nowrap;font-weight:600}
.pr.na{color:var(--mut);font-weight:400;font-size:13px}
.qt{white-space:nowrap;color:var(--mut);font-size:13px;min-width:52px;text-align:right}
.empty{padding:30px;text-align:center;color:var(--mut);display:none}
footer{padding:26px 16px 40px;text-align:center;color:var(--mut);font-size:13px}
@media(max-width:520px){.row{flex-wrap:wrap}.nm{flex-basis:100%}}
</style></head><body>

const list=document.getElementById('list'),chips=document.getElementById('chips'),q=document.getElementById('q'),empty=document.getElementById('empty');
let activeCat=null;
function fmt(p){return p==null?'<span class="pr na">цена по запросу</span>':'<span class="pr">'+p.toLocaleString('ru-RU')+'&nbsp;₽</span>'}
function render(){
 const term=q.value.trim().toLowerCase();
 list.innerHTML='';let shown=0;
 DATA.forEach(g=>{
  if(activeCat&&g.cat!==activeCat)return;
  const items=g.items.filter(it=>!term||it.n.toLowerCase().includes(term));
  if(!items.length)return;shown+=items.length;
  const sec=document.createElement('section');
  sec.innerHTML='<h2>'+g.cat+' <span class="cnt">'+items.length+'</span></h2>';
  const card=document.createElement('div');card.className='card';
  card.innerHTML=items.map(it=>'<div class="row"><div class="nm">'+it.n+'</div>'+fmt(it.p)+'<div class="qt">'+it.q+' шт</div></div>').join('');
  sec.appendChild(card);list.appendChild(sec);
 });
 empty.style.display=shown?'none':'block';
}
DATA.forEach(g=>{
 const c=document.createElement('div');c.className='chip';c.textContent=g.cat+' ('+g.items.length+')';
 c.onclick=()=>{activeCat=activeCat===g.cat?null:g.cat;
  [...chips.children].forEach(x=>x.classList.remove('on'));
  if(activeCat)c.classList.add('on');render();};
 chips.appendChild(c);
});
q.addEventListener('input',render);render();
